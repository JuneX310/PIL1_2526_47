<style>

            background-image: radial-gradient(circle at 20% 30%, rgba(12, 27, 84, 0.02) 0%, transparent 40%),

<body class="font-corps-md text-on-background min-h-screen flex items-center justify-center p-md">
<!-- Main Container -->
<main class="w-full max-w-[440px] animate-in fade-in duration-700 slide-in-from-bottom-4">
<!-- Brand Header (Simplified for focused task) -->
<div class="text-center mb-lg">
<h1 class="font-titre-h3 text-titre-h3 font-bold text-primary mb-2">IFRI_MentorLink</h1>
<div class="h-1 w-12 bg-secondary-container mx-auto rounded-full"></div>
</div>
<!-- Auth Card -->
<div class="bg-surface-carte rounded-[16px] shadow-[0px_4px_24px_rgba(12,27,84,0.06)] border border-outline-variant/30 overflow-hidden">
<div class="p-lg md:p-xl flex flex-col items-center">
<!-- Icon Header -->
<div class="w-16 h-16 bg-surface-container-low rounded-full flex items-center justify-center mb-md group transition-all hover:bg-surface-container">
<span class="material-symbols-outlined text-[32px] text-primary transition-transform group-hover:scale-110" data-icon="lock_reset">lock_reset</span>
</div>
<!-- Text Content -->
<div class="text-center mb-lg">
<h2 class="font-titre-h3 text-titre-h3 text-primary mb-2">Mot de passe oublié?</h2>
<p class="font-corps-md text-on-surface-variant">Entrez votre email, on vous envoie un lien</p>
</div>
<!-- Form -->
<form class="w-full space-y-md" onsubmit="return false;">
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-primary block ml-1" for="email">ADRESSE EMAIL</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]" data-icon="mail">mail</span>
<input class="w-full pl-11 pr-4 py-3 rounded-lg border border-outline-variant bg-white focus:ring-2 focus:ring-primary focus:border-primary transition-all font-corps-md placeholder:text-outline-variant" id="email" placeholder="exemple@uac.bj" type="email"/>
</div>
</div>
<button class="w-full bg-primary text-on-primary font-bouton text-bouton py-4 rounded-lg flex items-center justify-center gap-2 hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all shadow-md" type="submit">
                        Envoyer le lien
                        <span class="material-symbols-outlined text-[18px]" data-icon="send">send</span>
</button>
</form>
<!-- Footer Link -->
<div class="mt-lg">
<a class="flex items-center gap-2 text-primary font-bouton text-bouton hover:text-secondary transition-colors group" href="#">
<span class="material-symbols-outlined text-[18px] transition-transform group-hover:-translate-x-1" data-icon="arrow_back">arrow_back</span>
                        ← Retour à la connexion
                    </a>
</div>
</div>
<!-- Visual Decoration Footer -->
<div class="h-1.5 w-full bg-gradient-to-r from-primary via-secondary-container to-primary/80"></div>
</div>
<!-- Academic Resource Teaser (Optional branding element) -->
<div class="mt-lg text-center opacity-60">
<p class="font-label-caps text-label-caps text-on-surface-variant flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[14px]" data-icon="school">school</span>
                INSTITUT DE FORMATION ET DE RECHERCHE EN INFORMATIQUE
            </p>
</div>
</main>
<!-- Background Illustration Detail -->
<div class="fixed top-0 right-0 w-1/3 h-full overflow-hidden pointer-events-none -z-10 opacity-20 md:opacity-40">
<img alt="Academic background" class="w-full h-full object-cover mix-blend-multiply filter grayscale" data-alt="A professional academic setting at the IFRI university featuring modern architecture, students collaborating in the background with soft bokeh. The lighting is bright and airy, reflecting a high-end light-mode UI style. The color palette is dominated by deep blues and clean whites with subtle hints of warm wood and glass reflections, creating a mood of excellence and connection." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBFrNBJUqHtmt0554T938NbEZnrAtuSQ8dm22stUNOQlqC87Tqd2UhAFZMEtogd73SyCtF62urEllmDGesv8Zg2JmEtISVGnPkTnTTWDgRHU-EPUawqIeJGyCxcS-bZPNLyJQM2_o3n-dFfmYA99svr5r1uaGt88I7BYdz3v2KAb4cMrKSLtEMOkjJHkJYAJSxnjYlokz29i87POdaSUqvUEMce5WRL6C0emg56jxtGFcasUYlcmztRKlBvAFN0aukEkQzjLHgD05k"/>
</div>
<script>
        // Simple micro-interaction for the send button
        const form = document.querySelector('form');
        const submitBtn = form.querySelector('button');
        
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const originalContent = submitBtn.innerHTML;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <span class="animate-spin material-symbols-outlined" data-icon="progress_activity">progress_activity</span>
                Envoi en cours...
            `;
            
            // Simulate API call
            setTimeout(() => {
                submitBtn.classList.remove('bg-primary');
                submitBtn.classList.add('bg-succes');
                submitBtn.innerHTML = `
                    <span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
                    Lien envoyé !
                `;
                
                // Reset after 3 seconds
                setTimeout(() => {
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('bg-succes');
                    submitBtn.classList.add('bg-primary');
                    submitBtn.innerHTML = originalContent;
                }, 3000);
            }, 1500);
        });
    </script>
</body></html>
